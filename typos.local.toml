# Repository-specific identifiers, quotations and deliberate fixtures.

schema = 1

[oxford]
stems = []

[words]
accepted = ["Hashi"] # HashiCorp product-name prefix.

[words.corrections]

[patterns]
ignore = []

[files]
# Shared policy also excludes generated OpenTofu output; the Parabellum
# baseline report is generated and quotes commit SHA prefixes that the
# tokenizer misreads as words.
exclude = [".terraform", "docs/parabellum/baseline-report.md"]

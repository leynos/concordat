---
name: CI

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      TOFU_VERSION: "1.10.7"
    steps:
      - name: Check out repository
        # v4
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955

      - name: Set up Go
        # v5
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5
        with:
          go-version: '1.22'

      - name: Set up Python
        # v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'

      - name: Install uv
        # v5
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86

      - name: Install CLI tools
        run: |
          for tool in mbake ty ruff; do uv tool install ${tool}; done
          npm install -g markdownlint-cli2
          go install github.com/open-policy-agent/conftest@v0.52.0

      - name: Install OpenTofu
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git unzip
          tofu_zip="tofu_${TOFU_VERSION}_linux_amd64.zip"
          tofu_url="https://github.com/opentofu/opentofu/releases/download"
          tofu_url="${tofu_url}/v${TOFU_VERSION}/${tofu_zip}"
          if curl -fsSLO "${tofu_url}"; then
            unzip -q "${tofu_zip}" -d /tmp
            sudo mv /tmp/tofu /usr/local/bin/tofu
            sudo chmod +x /usr/local/bin/tofu
            rm "${tofu_zip}"
          else
            tofu_repo="https://github.com/opentofu/opentofu.git"
            git clone --depth 1 --branch "v${TOFU_VERSION}" \
              "${tofu_repo}" /tmp/opentofu
            cd /tmp/opentofu
            go build -o /tmp/tofu-bin ./cmd/tofu
            sudo mv /tmp/tofu-bin /usr/local/bin/tofu
            sudo chmod +x /usr/local/bin/tofu
          fi

      - name: Run Terratest suite
        working-directory: platform-standards/tofu/terratest
        env:
          TERRAFORM_BINARY: tofu
        run: go test

      - name: Run policy tests
        run: |
          conftest test \
            --policy platform-standards/tofu/policies \
            platform-standards/tofu/policies/examples/*.json

      - name: Validate Makefile
        run: mbake validate Makefile

      - name: Install code
        run: make build

      - name: Check formatting
        run: make check-fmt

      - name: Run ruff
        run: make lint

      - name: Run typechecker
        run: make typecheck

      - name: Generate coverage
        # Coverage is generated only on pull requests here; main-branch
        # coverage (which CodeScene requires for its "upload" mode) is
        # generated and uploaded by coverage-main.yml on push, so this
        # step is skipped there to avoid generating it twice.
        if: github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: coverage.xml
          format: cobertura
          pytest-workers: ''
          with-ratchet: 'true'
      # The `mode: check` step is deliberately not wired in yet: until a
      # repo's CodeScene project has a coverage-gates configuration,
      # `cs-coverage check` fails every run with "HTTP call succeeded,
      # but the received project-config isn't valid. Lacks the gates
      # configuration." — a CodeScene-side per-project setting, not a CI
      # defect. Add the check step in a fast-follow PR once
      # coverage-main.yml has uploaded to main at least once and the
      # gate is confirmed to resolve, or once CodeScene confirms the
      # project's coverage gate is enabled.

---
name: Coverage (main)

# CodeScene accepts `cs-coverage upload` only for analysed branches, so
# main-branch coverage is uploaded here on push; pull requests only
# generate coverage in ci.yml (no upload) until the project's coverage
# gate is confirmed. This workflow also advances the coverage ratchet
# baseline: caches saved on main are readable by every pull-request run,
# so the baseline written here is the one PR ratchet checks compare
# against.

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]

jobs:
  coverage-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        # v4
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        # v5
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.13'

      - name: Install uv
        # v5
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990

      - name: Generate coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: coverage.xml
          format: cobertura
          pytest-workers: ''
          with-ratchet: 'true'

      - name: Upload coverage data to CodeScene
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@29eea2635ee0f92e42c05f4cd360b7f1a2f00b12
        with:
          format: cobertura
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
